# ── Core simulation parameters ───────────────────────────────────────────────
backtest:
  start_date: "2013-01-01"
  end_date: "2026-04-17"        # inclusive; use "latest" to auto-detect
  initial_capital: 500000       # INR
  rebalance_freq_weeks: 4
  min_train_years: 2            # walk-forward warm-up
  transaction_cost_bps: 25      # round-trip bps per trade
  slippage_bps: 10              # market impact per trade
  emergency_rebalance: true     # risk-triggered intra-period rebalance
  benchmark_ticker: "^NSEI"

# ── Data paths ────────────────────────────────────────────────────────────────
paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  feature_data: "data/features"
  artifact_dir: "artifacts"
  model_dir: "artifacts/models"
  report_dir: "artifacts/reports"
  log_dir: "artifacts/logs"

# ── Universe ──────────────────────────────────────────────────────────────────
universe:
  mode: "static"               # static | historical_union_10y
  config_file: "config/universe.yaml"
  min_market_cap_cr: 500        # INR crore
  min_avg_volume_cr: 1          # INR crore daily avg volume
  max_stocks: 120
  large_cap_top_n: 100          # Nifty 100 proxy
  mid_cap_top_n: 150
  small_cap_top_n: 250
  cap_buckets:
    large: 0.60
    mid: 0.30
    small: 0.10
  historical_union:
    lookback_years: 10
    output_dir: "data/processed/universe/historical_union_10y"
    candidate_sector_map_file: null   # optional CSV/Parquet/JSON with ticker,sector
    min_price_history_days: 252
    min_median_traded_value_cr: 2.0
    liquidity_lookback_days: 63
    rebalance_frequency: "4W"
    use_active_window_filter: true
    relevance:
      min_history_days_for_relevance: 126
      market_cap_proxy_rank_max: 300
      min_median_traded_value_cr: 8.0
      include_if_in_broad_index: true
      broad_index_membership_file: null   # optional file with ticker[,date]
    sanity:
      min_stocks_per_sector: 2
      max_stocks_per_sector: 250

# ── Features ─────────────────────────────────────────────────────────────────
features:
  lookback_short: 21            # ~1 month
  lookback_medium: 63           # ~3 months
  lookback_long: 252            # ~1 year
  macro_lag: 1                  # days lag for macro features
  stock_lag: 1                  # days lag for stock features

# ── Sector scoring model ──────────────────────────────────────────────────────
sector_model:
  type: "lightgbm"
  n_estimators: 100
  learning_rate: 0.05
  max_depth: 4
  num_leaves: 31
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_samples: 20
  retrain_freq_weeks: 12        # Ablation 2 optimal: 12w beats 4/6/8/26w on clean data
  target: "fwd_4w_return_rank"  # cross-sectional rank of 4-week forward return

# ── Stock ranking model ───────────────────────────────────────────────────────
stock_model:
  type: "lightgbm"
  objective: "rank"
  n_estimators: 60
  learning_rate: 0.08
  max_depth: 4
  num_leaves: 31
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_samples: 30
  retrain_freq_weeks: 12        # Ablation 2 optimal: 12w beats 4/6/8/26w on clean data
  top_k_per_sector: 5           # stocks selected per sector
  fwd_window_days: 28           # default label horizon for stock ranking (~4 weeks)

# ── Portfolio optimizer ───────────────────────────────────────────────────────
optimizer:
  objective: "mean_variance"
  risk_aversion: 2.0
  max_stock_weight: 0.08
  max_sector_weight: 0.35
  min_stock_weight: 0.005
  max_cash: 0.30
  min_cash: 0.0
  max_turnover_per_rebalance: 0.40
  no_trade_band: 0.005          # ignore weight changes below this
  solver: "CLARABEL"

# ── Risk engine ───────────────────────────────────────────────────────────────
risk:
  max_drawdown_soft: 0.12       # soft alert
  max_drawdown_hard: 0.18       # hard cut
  max_realized_vol_ann: 0.30
  max_concentration_hhi: 0.15   # Herfindahl-Hirschman Index
  min_liquidity_days: 10        # portfolio can be liquidated in N days
  stress_cash_floor: 0.15       # cash floor in stressed regime
  regime_vol_threshold: 0.22    # above → stressed

# ── RL agent ─────────────────────────────────────────────────────────────────
rl:
  algorithm: "PPO"
  total_timesteps: 20000         # 20k confirmed optimal (50k = 23.37% vs 20k = 23.57%)
  learning_rate: 3.0e-4
  n_steps: 36                   # match minimum buffer size (36 periods before first retrain)
  batch_size: 16
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  reward_lambda_dd: 2.0         # drawdown penalty weight
  reward_lambda_to: 0.5         # turnover penalty weight
  reward_lambda_conc: 0.3       # concentration penalty
  reward_lambda_liq: 0.2        # liquidity penalty
  retrain_freq_weeks: 12        # Ablation 2 optimal: 12w beats 4/6/8/26w on clean data
  use_rl: true                  # set false to disable RL overlay

# ── Adaptive retrain triggers ─────────────────────────────────────────────────
rl_triggers:
  enabled: false                # set true to enable event-triggered retraining

  tier1_portfolio:              # hard triggers — immediate retrain
    drawdown_threshold: 0.10    # portfolio drawdown > 10%
    period_shock: -0.04         # single period return < -4%
    consecutive_losses: 3       # N losing periods in a row
    hit_rate_window: 10         # periods to measure realised win rate
    hit_rate_min: 0.45          # below this → model not working

  tier2_macro:                  # regime triggers — require persistence
    vix_jump_pct: 0.40          # India VIX rises 40%+ from 21-day avg
    vix_persistence_periods: 2  # must persist this many rebalance periods
    regime_flip: true           # bull↔bear or neutral↔stressed flip

  tier3_drift:                  # drift triggers — subtle but powerful
    sector_leadership_window: 4         # periods to track sector momentum rank
    sector_leadership_churn: 0.50       # >50% churn in top-3 sectors → retrain
    reward_shift_std: 1.5               # reward drops >1.5 std vs training baseline
    rl_entropy_increase_pct: 0.30       # action entropy up 30% → policy flattening
    min_buffer_for_drift: 20            # only check drift after this many steps

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
